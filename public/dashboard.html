<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot26 Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: #1a1a1a;
            border-bottom: 2px solid #0f0;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #0f0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .controls {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.2s;
            min-width: 120px;
        }
        
        .btn:hover:not(:disabled) {
            background: #0f0;
            color: #000;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn.danger {
            border-color: #f00;
            color: #f00;
        }
        
        .btn.danger:hover:not(:disabled) {
            background: #f00;
            color: #000;
        }
        
        .btn.loading {
            border-color: #ff0;
            color: #ff0;
        }
        
        .terminal-container {
            flex: 1;
            padding: 1rem;
            background: #000;
            overflow: hidden;
        }
        
        #terminal {
            width: 100%;
            height: 100%;
        }
        
        .xterm {
            height: 100%;
        }
        
        .xterm-viewport {
            overflow-y: auto !important;
        }

        /* Modal styles */
        dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #0f0;
            border-radius: 4px;
            background: #0a0a0a;
            padding: 0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            min-width: 400px;
            max-width: 500px;
            margin: 0;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(3px);
        }

        .modal-content {
            padding: 24px;
        }

        .modal-title {
            color: #0f0;
            font-size: 18px;
            margin-bottom: 16px;
            text-shadow: 0 0 8px #0f0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-message {
            color: #0f0;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons .btn {
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 DevBot26 Terminal</h1>
        <div class="controls" id="controls">
            <!-- Buttons will be dynamically updated -->
        </div>
    </div>
    
    <div class="terminal-container">
        <div id="terminal"></div>
    </div>

    <!-- Confirmation Modal -->
    <dialog id="confirmModal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Confirm</h3>
            <p class="modal-message" id="modalMessage">Are you sure?</p>
            <div class="modal-buttons">
                <button class="btn" id="modalCancel">Cancel</button>
                <button class="btn danger" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </dialog>

    <!-- Login Modal -->
    <dialog id="loginModal">
        <div class="modal-content">
            <h3 class="modal-title">Login Required</h3>
            <p class="modal-message">Enter credentials to access controls</p>
            <div style="margin-bottom: 20px;">
                <input type="text" id="loginUsername" placeholder="Username"
                    style="width: 100%; padding: 10px; background: #000; border: 1px solid #0f0; color: #0f0; font-family: 'Courier New', monospace; margin-bottom: 10px;">
                <input type="password" id="loginPassword" placeholder="Password"
                    style="width: 100%; padding: 10px; background: #000; border: 1px solid #0f0; color: #0f0; font-family: 'Courier New', monospace;">
            </div>
            <div class="modal-buttons">
                <button class="btn" id="loginCancel">Cancel</button>
                <button class="btn" id="loginSubmit">Login</button>
            </div>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
